<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dramaturgy</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<header>
  <h1>dramaturgy</h1>
  <div class="sub" id="repo-info"></div>
  <div class="spacer"></div>
  <button id="run-init" class="claude" data-i="init.run">Initialize all with Claude</button>
  <div class="langs">
    <label>ui <select id="ui-lang"><option>ja</option><option>en</option></select></label>
    <label>content <select id="content-lang"><option>ja</option><option>en</option></select></label>
    <button id="save-config" data-i="btn.save_config">Save</button>
  </div>
</header>

<div id="init-job" class="job topbar-job"></div>

<main>
  <!-- left: the map preview is the main surface -->
  <section id="viewer">
    <div class="viewer-bar">
      <span data-i="viewer.title">Meaning map preview</span>
      <span class="muted tiny" data-i="viewer.pin_hint">Click + on any item to add a finding.</span>
      <div class="spacer"></div>
      <button id="refresh-view" data-i="viewer.refresh">Refresh</button>
    </div>
    <iframe id="view-frame" src="about:blank"></iframe>
  </section>

  <!-- right: the review queue -->
  <aside id="queue">
    <div class="queue-head">
      <h2 data-i="rv.queue">Findings</h2>
      <div class="row">
        <button id="rv-run-all" class="primary" data-i="rv.run_all">Run queued</button>
      </div>
      <label class="tiny"><input type="checkbox" id="rv-continue"> <span data-i="rv.continue_session">continue Claude session</span></label>
      <p class="muted tiny" id="queue-empty" data-i="rv.no_map"></p>
    </div>
    <div id="rv-list"></div>
  </aside>
</main>

<!-- inline finding popover -->
<div id="rv-pop" class="pop" hidden>
  <div class="pop-head">
    <b id="pop-target"></b>
    <button id="pop-close" class="x">×</button>
  </div>
  <div class="subtabs" id="rv-kind">
    <input type="radio" name="rvkind" id="rv-reframe" value="reframe" checked>
    <label for="rv-reframe" data-i="rv.kind.reframe">reframe</label>
    <input type="radio" name="rvkind" id="rv-audit" value="audit">
    <label for="rv-audit" data-i="rv.kind.audit">audit</label>
    <input type="radio" name="rvkind" id="rv-proposal" value="proposal">
    <label for="rv-proposal" data-i="rv.kind.proposal">proposal</label>
  </div>
  <p class="muted tiny" id="rv-kind-help"></p>
  <textarea id="rv-comment" rows="3" placeholder="…"></textarea>
  <div class="row">
    <button id="rv-add" class="primary" data-i="rv.add">Add to queue</button>
    <button id="rv-add-run" class="claude" data-i="rv.add_run">Add &amp; run</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
