<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dramaturgy</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<header>
  <h1>dramaturgy</h1>
  <button id="toggle-dev" data-i="dev.toggle" aria-pressed="false">Developer mode</button>
  <div class="sub" id="repo-info"></div>
  <div class="spacer"></div>
  <button id="toggle-init-instr" class="dev-only" data-i="init.instr_toggle">Analysis instructions</button>
  <button id="run-init" class="claude dev-only" data-i="init.run">Analyze all</button>
  <div class="langs dev-only">
    <label>ui <select id="ui-lang"><option>ja</option><option>en</option></select></label>
    <label>content <select id="content-lang"><option>ja</option><option>en</option></select></label>
    <button id="save-config" data-i="btn.save_config">Save settings</button>
  </div>
</header>

<div id="init-instr-bar" class="dev-only" hidden>
  <label class="tiny" data-i="init.instr_label">Additional instructions for Claude (saved per repository, reused on every initialization):</label>
  <textarea id="init-instr" rows="3" placeholder="例: マスタ・トランザクションの区分をタグ付けしてください"></textarea>
  <div class="row">
    <button id="save-init-instr" data-i="init.instr_save">Save instructions</button>
    <span id="init-instr-status" class="status"></span>
  </div>
</div>

<div id="init-job" class="job topbar-job"></div>

<main>
  <!-- left: the map preview is the main surface -->
  <section id="viewer">
    <div class="viewer-bar">
      <span data-i="viewer.title">Meaning map preview</span>
      <span class="muted tiny" data-i="viewer.pin_hint">Click + on any item to add a finding.</span>
      <div class="spacer"></div>
      <button id="refresh-view" data-i="viewer.refresh">Refresh map</button>
      <button id="export-doc" data-i="viewer.export">Export HTML</button>
      <button id="toggle-queue" data-i="viewer.hide_queue">Hide findings</button>
    </div>
    <iframe id="view-frame" src="about:blank"></iframe>
  </section>

  <!-- right: the review queue -->
  <aside id="queue">
    <div class="queue-head">
      <h2 data-i="rv.queue">Findings</h2>
      <p class="muted tiny" data-i="rv.autorun_hint">Findings run automatically, in order.</p>
      <label class="tiny"><input type="checkbox" id="rv-continue"> <span data-i="rv.continue_session">continue Claude session</span></label>
      <p class="muted tiny" id="queue-empty" data-i="rv.no_map"></p>
    </div>
    <div id="rv-list"></div>
  </aside>
</main>

<!-- inline finding popover -->
<div id="rv-pop" class="pop" hidden>
  <div class="pop-head">
    <b id="pop-target"></b>
    <button id="pop-close" class="x">×</button>
  </div>
  <div class="subtabs" id="rv-kind">
    <input type="radio" name="rvkind" id="rv-reframe" value="reframe" checked>
    <label for="rv-reframe" data-i="rv.kind.reframe">reframe</label>
    <input type="radio" name="rvkind" id="rv-audit" value="audit">
    <label for="rv-audit" data-i="rv.kind.audit">audit</label>
    <input type="radio" name="rvkind" id="rv-proposal" value="proposal">
    <label for="rv-proposal" data-i="rv.kind.proposal">proposal</label>
  </div>
  <p class="muted tiny" id="rv-kind-help"></p>
  <textarea id="rv-comment" rows="3" placeholder="…"></textarea>
  <div class="row">
    <button id="rv-add" class="primary" data-i="rv.add">Add to queue</button>
  </div>
</div>

<!-- direct tag editor (no Claude): edit a concept's tags in place -->
<div id="tag-pop" class="pop" hidden>
  <div class="pop-head">
    <b id="tag-target"></b>
    <button id="tag-close" class="x">×</button>
  </div>
  <p class="muted tiny" data-i="tag.help">Edit this concept's tags. Click a vocabulary tag to toggle it, or type your own (comma/space separated).</p>
  <div id="tag-vocab" class="tag-filter"></div>
  <input id="tag-input" type="text" placeholder="master, transaction, …">
  <div class="row">
    <button id="tag-save" class="primary" data-i="tag.save">Save tags</button>
    <a href="#" id="tag-manage" class="tiny" data-i="tag.manage">manage vocabulary</a>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
